design_system:
  mood:
    keywords: [ミニマル, エディトリアル, モノクローム, 静謐, 知的な余白]
    tone: "写真とタイポグラフィそのもので魅せる、装飾を極限まで削ぎ落としたギャラリー的上質さ"
    energy_level: low

  color_palette:
    approach: "彩度をほぼ排したモノクロ基調。有彩色はごく限定的な機能記号にのみ許容し、基本は白黒グレーの階調と写真自体の色味だけで構成する"
    background:
      base: "純白ではないごく薄いウォームグレー"
      surface: "背景とほぼ同色。面を塗り分けるのではなく余白そのものでセクションを分離する"
    text:
      primary: "黒に近いダークグレー〜黒"
      secondary: "中間〜明るめのグレー（サブテキスト・補助ラベル用）"
    accent:
      primary: "基本的に無彩色運用。装飾としての差し色は使わない"
      usage: "有彩色は必須マークなど機能的な記号としてのみ、画面のごく一部（1点未満の面積感）に限定使用"
    semantic_categories:
      note: "カテゴリ分類は彩度ではなく明暗のコントラストで表現する"
      example_pairing: "黒背景+白文字の単色バッジのみ。色相によるカラーコーディングは行わない"
    borders_and_dividers: "極細の黒〜グレーの罫線、または線を使わず余白のみで区切る"

  typography:
    font_family_mood: "見出しは広いレタースペーシングを効かせた上品なサンセリフ／セリフ（ハイファッション誌的なエディトリアル書体）。本文は控えめなグロテスク系"
    hierarchy: "セクション見出しは大文字＋広いトラッキングで象徴的に大きく配置。本文は小さく軽やかにし、両者のジャンプ率を大きく取る"
    letter_spacing: "セクションタイトルや小ラベルには非常に広いトラッキングを使い、静かな緊張感と品格を演出"
    tone_of_voice_visual: "寡黙で知的。饒舌な演出を避け、写真とタイポグラフィ・余白の緊張関係で語らせる"

  spacing_and_layout_philosophy:
    principle: "極端なまでの余白を許容する。セクション同士は罫線ではなく空白の量で分離する"
    density: very_low
    grid_feel: "非対称配置（テキスト片側＋大きな写真片側など）を効果的に使う、機械的すぎない構成"

  shape_language:
    corner_radius: "角丸なし。写真・ボタン・タグすべて直角のシャープなエッジで統一"
    elevation: "影はほぼ使わない。フラットで静的な階層表現"
    borders: "塗りつぶしより細い輪郭線を好む。ボタンは背景塗りではなく輪郭線のみで表現"

  component_vocabulary:
    image_tag_badge: "写真の上に重ねる黒背景×白文字の角ばったラベル（カテゴリ表示）"
    outline_button: "塗りなしの矩形ボタン。広いトラッキングの大文字ラベルを中央配置"
    underline_input: "枠で囲まず下線のみのフォーム入力欄。装飾を排した記入体験"
    photography_first: "モノクロ・アーティスティックな写真を主役に据え、テキストは添える程度に留める"

  motion_and_interaction:
    principle: "動きはほぼ感じさせない。静止画のような落ち着きを保つ"
    hover_feedback: "最小限に留める（下線の出現、輪郭線の濃淡変化程度）"

  reusability_notes:
    portable: true
    description: >
      本トークンセットは特定の業種・コンテンツに依存しないエディトリアル系ミニマルデザイン言語である。
      配色（無彩色中心で装飾色を持たない）、極端に余白を多く取る低密度レイアウト、
      直角基調のシャープな形状言語、大文字＋広トラッキングの見出しタイポグラフィ、
      という組み合わせを保てば、ポートフォリオに限らず雑誌サイトやブランドサイトなど
      題材がまったく異なっても同一の「静かな高級感」を再現できる。
    excluded_on_purpose: [具体的な文言, セクション構成順序, ページ固有のレイアウト, 画像コンテンツ]
