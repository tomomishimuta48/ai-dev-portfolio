design_system:
  mood:
    keywords: [ミニマル, 温かみのあるニュートラル, プロフェッショナル, 静かな自信, 呼吸感のある余白]
    tone: "冷たすぎない上質さ。派手な演出をせず、コンテンツと余白そのものを主役にする"
    energy_level: low_to_mid   # 落ち着き優先。ただしアクセントカラー1色で温度感を足す

  color_palette:
    approach: "ほぼモノクロ+アクセント1色の抑制的パレット。彩度の高い色は最小限の面積のみに使う"
    background:
      base: "純白ではないオフホワイト（紙・生成りに近い温かい白）"
      surface: "背景よりわずかに明るい白、カード等の面に使用"
    text:
      primary: "黒に近いダークグレー（高コントラストだが漆黒は避ける）"
      secondary: "中間グレー（補足説明・メタ情報用、彩度なし）"
    accent:
      primary: "暖色系ワンポイントカラー（コーラル/テラコッタ寄りのオレンジ）"
      usage: "ロゴの一部、見出しの目印、ホバー状態、最重要CTAなど画面の1〜3%のみに限定使用"
    semantic_categories:
      note: "カテゴリやレベルを色分けする場合は、彩度低めのソフトなペア（背景=極薄トーン／文字=同系統の濃色）を複数用意する"
      example_pairing: "緑系（落ち着いた深緑+薄緑背景）、青系（くすんだネイビー+薄青背景）など、アクセントカラーとは別軸の色相を割り当てる"
    borders_and_dividers: "極薄いグレー、ほぼ気づかない程度の境界線"

  typography:
    font_family_mood: "人間味のあるサンセリフ（角の柔らかいゴシック体系）。硬すぎる機械的フォントは避ける"
    hierarchy: "見出しは太く大きく断定的に、本文・補足は軽量でゆったりと。ウェイト差でメリハリをつける"
    letter_spacing: "小さなラベルやカテゴリタグには広めのトラッキングを効かせて品位を出す"
    tone_of_voice_visual: "堂々としているが威圧的ではない。余白と組み合わせて上質さを演出"

  spacing_and_layout_philosophy:
    principle: "情報を詰め込まない。要素間に十分な呼吸空間を確保し、視覚的なゆとりを最優先する"
    density: low
    grid_feel: "整列されたグリッドだが機械的すぎない、カード間に均等な間隔"

  shape_language:
    corner_radius: "大きめの角丸（カード・ボタン・タグすべてに一貫して適用）"
    elevation: "影は控えめ。ホバー時など状態変化のときだけ柔らかい浮遊感を軽く足す"
    borders: "塗りつぶしよりも細い輪郭線を好む（特に非アクティブ要素）"

  component_vocabulary:
    pill_tag: "背景色を敷いた丸みの強いラベル。カテゴリ分類やメタ情報の可視化に使う抽象パーツ"
    filter_toggle: "選択中=濃色塗りつぶし、非選択=輪郭線のみのニュートラル、という二値表現"
    card: "面＋薄い輪郭線＋大きめ角丸。ホバーで微小に浮き上がる"
    modal_overlay: "背景を暗く落として単一要素にフォーカスさせる、劇場的だが装飾は最小限"

  motion_and_interaction:
    principle: "動きは控えめで滑らか。派手なアニメーションより、状態変化の分かりやすさを優先"
    hover_feedback: "色の濃淡変化、わずかな浮き上がり、影の増加程度に留める"

  reusability_notes:
    portable: true
    description: >
      本トークンセットは特定のコンテンツ・業界・ページ構成に依存しない抽象的な
      デザイン言語である。ポートフォリオ、SaaSのランディングページ、
      ブログ、ダッシュボードなど、題材が変わっても
      「配色（オフホワイト×ダークグレー×暖色アクセント1色）」
      「余白多めのミニマルな密度」「大きめ角丸+極薄ボーダー」
      「控えめなモーション」という組み合わせを保てば同一の雰囲気を再現できる。
    excluded_on_purpose: [具体的な文言, セクション構成順序, ページ固有のレイアウト, 画像コンテンツ]
